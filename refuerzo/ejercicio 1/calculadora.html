<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Práctica</title>
    <link rel="stylesheet" href="/refuerzo/ejercicio 1/calculadora.css">
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div id="previous-operand" class="previous-operand"></div>
            <div id="current-operand" class="current-operand">0</div>
        </div>
        <div class="buttons-grid">
            <button class="btn col-2 action" id="clear">AC</button>
            <button class="btn action" id="delete">DEL</button>
            <button class="btn operator" data-operation>/</button>
            <button class="btn" data-number>7</button>
            <button class="btn" data-number>8</button>
            <button class="btn" data-number>9</button>
            <button class="btn operator" data-operation>*</button>
            <button class="btn" data-number>4</button>
            <button class="btn" data-number>5</button>
            <button class="btn" data-number>6</button>
            <button class="btn operator" data-operation>-</button>
            <button class="btn" data-number>1</button>
            <button class="btn" data-number>2</button>
            <button class="btn" data-number>3</button>
            <button class="btn operator" data-operation>+</button>
            <button class="btn col-2" data-number>0</button>
            <button class="btn" data-number>.</button>
            <button class="btn equal" id="equals">=</button>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
